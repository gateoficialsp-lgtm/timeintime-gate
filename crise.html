<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sala de Crise</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  display:grid;
  grid-template-columns: 15% 70% 15%;
  grid-template-rows: 130px auto 80px;
  height:120vh;
}

.header {
  grid-column:1 / 4;
  background:#111;
  padding:10px;
}

/* filtros */
.filtros input, .filtros select, .filtros button {
  padding:8px;
  margin:3px;
}

/* layout */
.left { background:#1a1a1a; padding: 10px; overflow:auto; }
.center { padding:15px; overflow:auto; }
.right { background:#1a1a1a; padding:10px; }

.footer {
  grid-column:1 / 4;
  background:#000;
  text-align:center;
  padding:10px;
}

.evento {
  padding:10px;
  border-bottom:1px solid #333;
}

.gauge {
  height:25px;
  background:linear-gradient(to right, red, yellow, green);
  position:relative;
}

.pointer {
  width:4px;
  height:35px;
  background:#fff;
  position:absolute;
  top:-5px;
}
</style>
</head>

<body>

<!-- TOPO COM FILTROS -->
<div class="header">

<div class="filtros">

<b>ID direto:</b>
<input id="inputId" placeholder="Digite o ID">
<button onclick="carregarPorId()">Abrir</button>

<br>

<b>Filtrar por data:</b>
<input type="date" id="filtroData">
<button onclick="buscarPorData()">Buscar</button>

<select id="listaIncidentes"></select>
<button onclick="selecionarLista()">Abrir selecionado</button>

</div>

<hr>

<div>
<b>ID:</b> <span id="id"></span> |
<b>Unidade:</b> <span id="unidade"></span> |
<b>Início:</b> <span id="inicio"></span> |
<b>Status:</b> <span id="status">---</span>
</div>

</div>

<!-- ESQUERDA -->
<div class="left">
<h3>🟢 Proteção</h3>
<div id="protecao"></div>

<h3>🔴 Risco</h3>
<div id="risco"></div>
</div>

<!-- CENTRO -->
<div class="center">
<h2>📡 Eventos</h2>
<div id="eventos"></div>
</div>

<!-- DIREITA -->
<div class="right">
<h3>🧠 Análise</h3>

<div id="ultimo"></div>
<div id="recomendacao" style="margin-top:10px; font-weight:bold;"></div>
<div id="alertaSonoro"></div>

<div class="gauge">
<div id="ponteiro" class="pointer" style="left:50%"></div>
</div>

<h4 id="tendencia"></h4>
</div>

<!-- RODAPÉ -->
<div class="footer">
<span id="alerta"></span>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwsuihkPbsPQr_-ZDrBUkBhtVIJDAdIJ3FEkz5gEK_54Y06DtYhijC6moje6zD2HR-u/exec";
let idAtual = "";

// 🔎 abrir por ID digitado
function carregarPorId(){
  let id = document.getElementById("inputId").value;
  if(!id){ alert("Informe o ID"); return; }
  idAtual = id;
  carregarTudo();
}

// 🔎 buscar por data
function buscarPorData(){

  let data = document.getElementById("filtroData").value;

  fetch(API + "?tipo=incidentes")
  .then(r=>r.json())
  .then(lista=>{

    let select = document.getElementById("listaIncidentes");
    select.innerHTML = "";

    lista.forEach(item=>{

      if(data && !item.inicio.includes(data)) return;

      let opt = document.createElement("option");
      opt.value = item.id;
      opt.text = item.id + " | " + item.ocorrencia + " | " + item.unidade;

      select.appendChild(opt);
    });

  });
}

// 🔎 selecionar da lista
function selecionarLista(){
  let id = document.getElementById("listaIncidentes").value;
  if(!id){ alert("Selecione um incidente"); return; }
  idAtual = id;
  carregarTudo();
}

// 📋 cabeçalho
function carregarCabecalho(){

  fetch(API + "?tipo=incidentes")
  .then(r=>r.json())
  .then(lista=>{

    lista.forEach(item=>{

      if(item.id == idAtual){

        document.getElementById("id").innerText = item.id;
        document.getElementById("inicio").innerText = item.inicio;
        document.getElementById("unidade").innerText = item.unidade;

        document.getElementById("status").innerText =
          item.fim ? "FINALIZADO" : "EM ANDAMENTO";

      }

    });

  });
}

// 📊 eventos
function atualizar(){

  fetch(API + "?tipo=eventos&id=" + idAtual)
  .then(r=>r.json())
  .then(lista=>{

    let eventosDiv = document.getElementById("eventos");
    eventosDiv.innerHTML = "";

    let protecao = new Set();
    let risco = new Set();
    let recomendacao = "";
    let alertaCritico = false;

    let score = 0;
    let ultimo = "";

    // 🧠 PROCESSAMENTO NORMAL (ordem cronológica)
    lista.forEach(e=>{

      if(e.positivos) protecao.add(e.positivos);
      if(e.negativos) risco.add(e.negativos);

      // 🔴 REGRA DE ESCALADA CRÍTICA IMEDIATA
      if(e.violencia === "Agride ou atira" || e.violencia === "Mata reféns"){
        alertaCritico = true;
      }  
      if(e.progresso){
        score++;
        ultimo = "🟢 " + e.progresso;
      }

      if(e.violencia){
        score--;
        ultimo = "🔴 " + e.violencia;
      }

    });

    // 🎯 RECOMENDAÇÃO AUTOMÁTICA
  if(alertaCritico){
    recomendacao = "🚨 INTERVENÇÃO IMEDIATA / PROTOCOLO TÁTICO";
  }
  else if(score <= -3){
    recomendacao = "🔴 REDUZIR PRESSÃO / PAUSA ESTRATÉGICA";
  }
  else if(score >= 3){
    recomendacao = "🟢 MANTER ESTRATÉGIA ATUAL";
  }
  else{
    recomendacao = "🟡 ESTABILIZAR / ESCUTA ATIVA";
  }

  // aplicar
  document.getElementById("recomendacao").innerText = recomendacao;

  // 🚨 ALERTA VISUAL + SONORO
  if(alertaCritico){
    document.getElementById("alerta").innerText = "🚨 ESCALADA CRÍTICA IMEDIATA";
    document.getElementById("alerta").style.color = "red";

    // som
    document.getElementById("alertaSonoro").innerHTML =
      '<audio autoplay><source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>';
  }
    
    // 📡 EXIBIÇÃO (mais recente primeiro)
    lista.slice().reverse().forEach(e=>{
      eventosDiv.innerHTML += `<div class="evento">${e.descricao}</div>`;
    });

    // lateral
    document.getElementById("protecao").innerHTML =
      [...protecao].join("<br>");

    document.getElementById("risco").innerHTML =
      [...risco].join("<br>");

    // 🔥 agora correto
    document.getElementById("ultimo").innerText = ultimo;

    // 🎯 ODÔMETRO
    let pos = 50 + (score * 5);
    pos = Math.max(0, Math.min(100, pos));
    document.getElementById("ponteiro").style.left = pos + "%";

    // tendência
    let tendencia = "ESTÁVEL";
    if(score > 2) tendencia = "PROGRESSO";
    if(score < -2) tendencia = "RISCO ELEVADO";

    document.getElementById("tendencia").innerText = tendencia;

    // alerta padrão (se não for crítica imediata)
    if(document.getElementById("alerta").innerText === ""){
      let alerta = "";
      if(score < -3) alerta = "🚨 ESCALADA CRÍTICA";
      if(score > 3) alerta = "🟢 EVOLUÇÃO POSITIVA";
      document.getElementById("alerta").innerText = alerta;
    }

  });
}

function carregarTudo(){
  carregarCabecalho();
  atualizar();
}

setInterval(()=>{ if(idAtual) atualizar(); }, 3000);

</script>

</body>
</html>
