<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sala de Crise</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  display:grid;
  grid-template-columns: 15% 70% 15%;
  grid-template-rows: 150px auto 80px;
  height:100vh;
}

.header { grid-column:1 / 4; background:#111; padding:10px; }
.left { background:#1a1a1a; padding:10px; overflow:auto; }
.center { padding:15px; overflow:auto; }
.right { background:#1a1a1a; padding:10px; }
.footer { grid-column:1 / 4; background:#000; text-align:center; padding:10px; }

.evento { padding:10px; border-bottom:1px solid #333; }

.gauge { height:25px; background:linear-gradient(to right, red, yellow, green); position:relative; }
.pointer { width:4px; height:35px; background:#fff; position:absolute; top:-5px; }
</style>
</head>

<body>

<div class="header">

<div>
<b>ID:</b>
<input id="inputId">
<button onclick="carregarPorId()">Abrir</button>

<button onclick="gerarPDF()">📄 Relatório</button>
</div>

<br>

<div>
<b>Filtrar por data:</b>
<input type="date" id="filtroData">
<button onclick="buscarPorData()">Buscar</button>

<select id="listaIncidentes"></select>
<button onclick="selecionarLista()">Abrir</button>
</div>

<hr>

<div>
<b>ID:</b> <span id="id"></span> |
<b>Unidade:</b> <span id="unidade"></span> |
<b>Status:</b> <span id="status"></span>
</div>

</div>

<div class="left">
<h3>🟢 Proteção</h3>
<div id="protecao"></div>

<h3>🔴 Risco</h3>
<div id="risco"></div>
</div>

<div class="center">
<h2>📡 Eventos</h2>
<div id="eventos"></div>
</div>

<div class="right">
<h3>🧠 Análise</h3>

<div class="gauge">
<div id="ponteiro" class="pointer"></div>
</div>

<button onclick="pararAlarme()">🔇 Silenciar</button>
</div>

<div class="footer">
<span id="alerta"></span>
</div>

<audio id="alarmeAudio" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const API = "https://script.google.com/macros/s/AKfycbwsuihkPbsPQr_-ZDrBUkBhtVIJDAdIJ3FEkz5gEK_54Y06DtYhijC6moje6zD2HR-u/exec";

let idAtual = "";
let estadoCriticoAnterior = false;
let alarmeSilenciado = false;
let alarmeAtivo = false;

// 🔊 ÁUDIO
function tocarAlarme(){
  if(alarmeSilenciado || alarmeAtivo) return;

  let audio = document.getElementById("alarmeAudio");
  audio.currentTime = 0;
  audio.play();

  alarmeAtivo = true;
}

function pararAlarme(){
  let audio = document.getElementById("alarmeAudio");
  audio.pause();
  audio.currentTime = 0;

  alarmeSilenciado = true;
  alarmeAtivo = false;
}

// 📄 PDF
function gerarPDF(){
  if(!idAtual){
    alert("Selecione um incidente");
    return;
  }
  window.open(API + "?relatorio=" + idAtual, "_blank");
}

// 🔎 ID
function carregarPorId(){
  idAtual = document.getElementById("inputId").value;
  carregarCabecalho();
}

// 🔎 DATA
function buscarPorData(){

  let data = document.getElementById("filtroData").value;

  fetch(API + "?tipo=incidentes")
  .then(r=>r.json())
  .then(lista=>{

    let select = document.getElementById("listaIncidentes");
    select.innerHTML = "";

    lista.forEach(item=>{

      let dataInicio = item.inicio.split("T")[0];
      if(data && dataInicio !== data) return;

      let opt = document.createElement("option");
      opt.value = item.id;
      opt.text = item.id + " | " + item.ocorrencia + " | " + item.unidade;

      select.appendChild(opt);
    });

  });
}

// 🔎 SELEÇÃO
function selecionarLista(){
  idAtual = document.getElementById("listaIncidentes").value;
  carregarCabecalho();
}

// 📋 CABEÇALHO
function carregarCabecalho(){

  fetch(API + "?tipo=incidentes")
  .then(r=>r.json())
  .then(lista=>{

    lista.forEach(item=>{
      if(item.id == idAtual){
        document.getElementById("id").innerText = item.id;
        document.getElementById("unidade").innerText = item.unidade;
        document.getElementById("status").innerText =
          item.fim ? "FINALIZADO" : "EM ANDAMENTO";
      }
    });

  });
}

// 📊 EVENTOS
function atualizar(){

  fetch(API + "?tipo=eventos&id=" + idAtual)
  .then(r=>r.json())
  .then(lista=>{

    let alertaCritico = false;
    let score = 0;

    let eventosDiv = document.getElementById("eventos");
    eventosDiv.innerHTML = "";

    lista.forEach(e=>{

      if(e.violencia === "Agride ou atira" || e.violencia === "Mata reféns"){
        alertaCritico = true;
      }

      if(e.progresso) score++;
      if(e.violencia) score--;
    });

    if(alertaCritico && !estadoCriticoAnterior){
      tocarAlarme();
    }

    estadoCriticoAnterior = alertaCritico;

    document.getElementById("alerta").innerText =
      alertaCritico ? "🚨 ESCALADA CRÍTICA" : "";

  lista.slice().reverse().forEach(e=>{

    let data = new Date(e.data);

    let hora =
      data.getHours().toString().padStart(2,"0") + ":" +
      data.getMinutes().toString().padStart(2,"0");

    eventosDiv.innerHTML += `
      <div class="evento">
        <span style="color:#00e5ff; font-weight:bold;">${hora}</span>
        — ${e.descricao}
      </div>
    `;
  });

    let pos = 50 + score*5;
    document.getElementById("ponteiro").style.left = pos+"%";

  });
}

setInterval(()=>{ if(idAtual) atualizar(); }, 3000);

</script>

</body>
</html>
