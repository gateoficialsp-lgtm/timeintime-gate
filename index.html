<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time In Time</title>

<style>
body { font-family: Arial; padding:20px; background:#111; color:#fff; }
input, textarea, select, button {
  width:100%; margin:5px 0; padding:12px;
  border-radius:8px; border:none;
}
textarea { height:150px; }
button { background:#1e88e5; color:white; font-weight:bold; }
button:disabled { background:#555; }
h3 { margin-top:20px; }
label { display:block; margin-top:10px; }
</style>
</head>

<body>

<h2>🪖 TIME IN TIME</h2>

<!-- INICIAR -->
<h3>📋 Iniciar Incidente</h3>

<input id="local" placeholder="Capturando localização..." readonly>

<select id="ocorrencia">
  <option value="">Selecione ocorrência</option>
  <option value="PPS">PPS - Pessoa com Propósito Suicida</option>
  <option value="REF">REF - Refém</option>
  <option value="CRE">CRE - Criminoso Embarricado</option>
  <option value="MAR">MAR - Mandado de alto risco</option>
</select>

<input id="unidade" placeholder="Unidade (ex: 4º BPChq, 9º BPM/M)">

<input id="responsavel" placeholder="Responsável">

<button id="btnIniciar" onclick="iniciar()">Iniciar</button>

<hr>

<!-- EVENTOS -->
<h3>⏱️ Eventos</h3>

<input id="id" placeholder="ID do incidente">

<textarea id="descricao" placeholder="Descrição detalhada"></textarea>

<select id="emc">
  <option value="">EMC (opcional)</option>
  <option value="01">Escuta Ativa</option>
  <option value="02">Empatia</option>
  <option value="03">Rapport</option>
  <option value="04">Influência</option>
  <option value="05">Mudança</option>
</select>

<label>
  <input type="checkbox" id="negociacao" checked>
  Negociação Real
</label>

<label>
  <input type="checkbox" id="pausa">
  Pausa estratégica
</label>

<select id="indicadorProgresso">
  <option value="">Indicador de Progresso</option>
  <option>Tom de voz mais baixo e aberto ao diálogo</option>
  <option>Comportamento mais ameno</option>
  <option>Não agride nem atira</option>
  <option>Ouve conselhos</option>
  <option>Vínculo com negociador</option>
</select>

<select id="indicadorViolencia">
  <option value="">Indicador de Violência</option>
  <option>Tom de voz alto e imperativo</option>
  <option>Comportamento agressivo</option>
  <option>Agride ou atira</option>
  <option>Ameaça se matar</option>
  <option>Mata reféns</option>
</select>

<textarea id="pos" placeholder="Fatores de proteção"></textarea>
<textarea id="neg" placeholder="Fatores de risco"></textarea>

<button onclick="registrar()">Registrar Evento</button>

<hr>

<!-- FINALIZAR -->
<h3>🏁 Finalizar</h3>

<input id="idFinalizar">
<button onclick="finalizar()">Finalizar</button>

<p id="status"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwsuihkPbsPQr_-ZDrBUkBhtVIJDAdIJ3FEkz5gEK_54Y06DtYhijC6moje6zD2HR-u/exec";

let lat="", lng="", incidenteId="";

// 📍 GPS AUTOMÁTICO
navigator.geolocation.getCurrentPosition(
  function(pos){
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    document.getElementById("local").value =
      lat.toFixed(6) + ", " + lng.toFixed(6);
  },
  function(){
    document.getElementById("local").value = "Localização indisponível";
  }
);

// 🚀 INICIAR
function iniciar(){

  let local = document.getElementById("local").value;
  let ocorrencia = document.getElementById("ocorrencia").value;
  let responsavel = document.getElementById("responsavel").value;
  let unidade = document.getElementById("unidade").value;

  if(!local || !ocorrencia || !responsavel || !unidade){
    alert("Preencha todos os campos");
    return;
  }

  incidenteId = Date.now();

  document.getElementById("id").value = incidenteId;
  document.getElementById("idFinalizar").value = incidenteId;

  fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({
      tipo:"inicio",
      id: incidenteId,
      local: local,
      ocorrencia: ocorrencia,
      responsavel: responsavel,
      unidade: unidade
    })
  });

  document.getElementById("status").innerText = "Incidente iniciado";
}

// 📝 REGISTRAR
function registrar(){

  let idAtual = document.getElementById("id").value;

  if(!idAtual){
    alert("Informe o ID");
    return;
  }

  fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({
      tipo:"evento",
      id: idAtual,
      descricao: document.getElementById("descricao").value,
      emc: document.getElementById("emc").value,
      negociacao: document.getElementById("negociacao").checked,
      pausa: document.getElementById("pausa").checked,
      progresso: document.getElementById("indicadorProgresso").value,
      violencia: document.getElementById("indicadorViolencia").value,
      positivos: document.getElementById("pos").value,
      negativos: document.getElementById("neg").value,
      latitude: lat,
      longitude: lng
    })
  });

  document.getElementById("descricao").value="";
  document.getElementById("pos").value="";
  document.getElementById("neg").value="";
}

function finalizar(){

  let idAtual = document.getElementById("idFinalizar").value;

  fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({
      tipo:"fim",
      id: idAtual
    })
  });

  document.getElementById("status").innerText="Incidente finalizado";
}

</script>

</body>
</html>
