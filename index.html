<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time In Time</title>

<style>
body { font-family: Arial; padding:20px; background:#111; color:#fff; }
input, textarea, select, button {
  width:100%; margin:5px 0; padding:12px;
  border-radius:8px; border:none;
}
textarea { height:150px; }
button { background:#1e88e5; color:white; font-weight:bold; }
button:disabled { background:#555; }
h3 { margin-top:20px; }
label { display:block; margin-top:10px; }
</style>
</head>

<body>ou
<h2>🪖 TIME IN TIME</h2>

<h3>📋 Iniciar Incidente</h3>

<input id="local" readonly>

<select id="ocorrencia">
  <option value="">Selecione ocorrência</option>
  <option value="PPS">PPS - Pessoa armada com Propósito Suicida</option>
  <option value="REF">REF - Ocorrência com Refém</option>
  <option value="CRE">CRE - Criminoso Embarricado</option>
  <option value="CRS">CRS - Criminoso Embarricado com propósito suicida</option>
  <option value="CRH">CRH - Criminoso homiziado</option>
  <option value="PPT">PPT - Pessoa com Propósito Suicida com Terceiro em Risco</option>
  <option value="PEM">PEM - Pessoa Embarricada</option>
  <option value="PES">PES - Pessoa em Surto (Embarricada ou Não)</option>  
  <option value="MAR">MAR - Mandado de alto risco</option>
  <option value="OUT">OUT - Outros</option>  
</select>

<input id="unidade" placeholder="Unidade">
<input id="responsavel" placeholder="Responsável">

<button id="btnIniciar" onclick="iniciar()">Iniciar</button>

<hr>

<h3>⏱️ Eventos</h3>

<input id="id">

<textarea id="descricao"></textarea>

<select id="emc">
  <option value="">EMC</option>
  <option value="01">Escuta Ativa</option>
  <option value="02">Empatia</option>
  <option value="03">Rapport</option>
  <option value="04">Influência</option>
  <option value="05">Mudança de Comportamento</option>
  
</select>

<label><input type="checkbox" id="negociacao" checked> Negociação Real</label>
<label><input type="checkbox" id="pausa"> Pausa estratégica</label>

<select id="indicadorProgresso">
  <option value="">Indicador de Progresso</option>
  <option>Tom de voz mais baixo, linguagem mais passional e aberto ao diálogo</option>
  <option>Comportamento mais ameno e sincero</option>
  <option>Não agride nem atira</option>
  <option>Passa prazo de exigências sem consequências</option>
  <option>Ouve conselhos e sugestões</option>
  <option>Discute tópicos fora do expediente</option>
  <option>Afinidade com reféns</option>
  <option>Vínculo com negociador</option>
  <option>Não ameaça se matar</option>
  <option>Não mata reféns</option>
</select>

<select id="indicadorViolencia">
  <option value="">Indicador de Violência</option>
  <option>Tom de voz mais alto, linguagem emocional e imperativa</option>
  <option>Comportamento mais agressivo e dissimulado</option>
  <option>Agride e atira ao mesmo tempo</option>
  <option>Cobra o cumprimento das exigências frequentemente</option>
  <option>Não está aberto a reflexões</option>
  <option>Só discute sobre fuga ou morte</option>
  <option>Agressividade com reféns (desumaniza)</option>
  <option>Sem vínculo com negociador</option>
  <option>Ameaça se matar</option>
  <option>Mata reféns</option>
</select>

<textarea id="pos"></textarea>
<textarea id="neg"></textarea>

<button onclick="registrar()">Registrar Evento</button>

<hr>

<h3>🏁 Finalizar</h3>

<input id="idFinalizar">
<button onclick="finalizar()">Finalizar</button>

<p id="status"></p>

<script>

const API_URL = "SEU_LINK_AQUI";

let lat="", lng="", incidenteId="";

navigator.geolocation.getCurrentPosition(
  pos=>{
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    document.getElementById("local").value =
      lat.toFixed(6)+", "+lng.toFixed(6);
  }
);

function enviarOuSalvar(dados){

  fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(dados)
  });

}

function iniciar(){

  incidenteId = Date.now();

  document.getElementById("id").value = incidenteId;
  document.getElementById("idFinalizar").value = incidenteId;

  enviarOuSalvar({
    tipo:"inicio",
    id:incidenteId,
    local:document.getElementById("local").value,
    ocorrencia:document.getElementById("ocorrencia").value,
    responsavel:document.getElementById("responsavel").value,
    unidade:document.getElementById("unidade").value
  });

  document.getElementById("status").innerText="Incidente iniciado";
}

function registrar(){

  enviarOuSalvar({
    tipo:"evento",
    id:document.getElementById("id").value,
    descricao:document.getElementById("descricao").value,
    emc:document.getElementById("emc").value,
    negociacao:document.getElementById("negociacao").checked,
    pausa:document.getElementById("pausa").checked,
    progresso:document.getElementById("indicadorProgresso").value,
    violencia:document.getElementById("indicadorViolencia").value,
    positivos:document.getElementById("pos").value,
    negativos:document.getElementById("neg").value,
    latitude:lat,
    longitude:lng
  });

  document.getElementById("descricao").value="";
  document.getElementById("status").innerText="Evento registrado";
}

function finalizar(){

  let idAtual = document.getElementById("idFinalizar").value;

  enviarOuSalvar({
    tipo:"fim",
    id:idAtual
  });

  document.getElementById("status").innerText="Finalizado";
}

</script>

</body>
</html>
