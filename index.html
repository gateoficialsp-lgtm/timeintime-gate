<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time In Time</title>

<style>
body { font-family: Arial; padding:20px; background:#111; color:#fff; }
input, textarea, select, button {
  width:100%; margin:5px 0; padding:12px;
  border-radius:8px; border:none;
}
button { background:#1e88e5; color:white; font-weight:bold; }
h3 { margin-top:20px; }
</style>
</head>

<body>

<h2>🪖 TIME IN TIME</h2>

<!-- INICIAR -->
<h3>📋 Iniciar Incidente</h3>

<input id="local" placeholder="Capturando localização..." readonly>
<input id="ocorrencia" placeholder="Ocorrência">
<input id="responsavel" placeholder="Responsável">

<button id="btnIniciar" onclick="iniciar()">Iniciar</button>

<hr>

<!-- EVENTOS -->
<h3>⏱️ Eventos</h3>

<input id="id" placeholder="ID" readonly>

<textarea id="descricao" placeholder="Descrição"></textarea>

<select id="emc">
  <option value="">EMC (opcional)</option>
  <option value="01">Escuta Ativa</option>
  <option value="02">Empatia</option>
  <option value="03">Rapport</option>
  <option value="04">Influência</option>
  <option value="05">Mudança</option>
</select>

<textarea id="pos" placeholder="Positivos"></textarea>
<textarea id="neg" placeholder="Negativos"></textarea>

<button onclick="registrar()">Registrar Evento</button>

<hr>

<!-- FINALIZAR -->
<h3>🏁 Finalizar</h3>

<input id="idFinalizar" readonly>
<button onclick="finalizar()">Finalizar</button>

<p id="status"></p>

<script>

let lat="", lng="";
let incidenteId="";

// GPS
navigator.geolocation.getCurrentPosition(pos=>{
  lat = pos.coords.latitude;
  lng = pos.coords.longitude;
  document.getElementById("local").value =
    lat.toFixed(6)+", "+lng.toFixed(6);
});

// INICIAR
function iniciar(){

  incidenteId = Date.now();

  document.getElementById("id").value = incidenteId;
  document.getElementById("idFinalizar").value = incidenteId;

  document.getElementById("btnIniciar").disabled = true;
  document.getElementById("ocorrencia").disabled = true;
  document.getElementById("responsavel").disabled = true;

  document.getElementById("status").innerText =
    "Incidente iniciado | ID: "+incidenteId;
}

// REGISTRAR
function registrar(){

  let dados = {
    id: incidenteId,
    descricao: document.getElementById("descricao").value,
    emc: document.getElementById("emc").value,
    positivos: document.getElementById("pos").value,
    negativos: document.getElementById("neg").value,
    latitude: lat,
    longitude: lng
  };

 fetch("https://script.google.com/macros/s/AKfycbwsuihkPbsPQr_-ZDrBUkBhtVIJDAdIJ3FEkz5gEK_54Y06DtYhijC6moje6zD2HR-u/exec", {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify(dados)
})

    document.getElementById("descricao").value="";
    document.getElementById("pos").value="";
    document.getElementById("neg").value="";
    document.getElementById("emc").value="";

    document.getElementById("status").innerText =
      "Evento registrado";
  });
}

// FINALIZAR
function finalizar(){

  document.getElementById("btnIniciar").disabled=false;

  document.getElementById("id").value="";
  document.getElementById("idFinalizar").value="";

  document.getElementById("status").innerText =
    "Incidente finalizado";
}

</script>

</body>
</html>
